version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sidehunt-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - APP_NAME=SideHunt
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - APP_TIMEZONE=Asia/Jakarta
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=sidehunt
      - DB_USERNAME=sidehunt_user
      - DB_PASSWORD=sidehunt_password
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 60s
    networks:
      - sidehunt-network

  mysql:
    image: mysql:8.0
    container_name: sidehunt-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=sidehunt
      - MYSQL_USER=sidehunt_user
      - MYSQL_PASSWORD=sidehunt_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s
    networks:
      - sidehunt-network

  redis:
    image: redis:7-alpine
    container_name: sidehunt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 5
      interval: 10s
      start_period: 20s
    networks:
      - sidehunt-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local

networks:
  sidehunt-network:
    driver: bridge